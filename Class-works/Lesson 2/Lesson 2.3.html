<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        *{
            margin: 0;
        }
        body{
            height: 100vh;
        }
        .box{
            width: 200px ;
            height: 200px;
        }
        .pink{
            background-color: #f453c1;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .pink p{
            /*text-align: center;*/
        }
        .blue{
            background-color: blue;
        }
        .gray{
            background-color: gray;
        }
        .flex{
            height: 100%;
            background-color: #66646a;
            display: flex;
            justify-content: center;
            gap: 20px;
            align-items: center;
            flex-direction: column-reverse;

        }

    </style>
</head>
<body>
<div class="flex">
    <div class="box pink">
        <p>Lorem ipsum dolor.</p>
    </div>
    <div class="box blue"></div>
    <div class="box gray"></div>
</div>

</body>
</html>
