<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        .pink-box{
            width: 200px;
            height: 200px;
            background-color: #f453c1;
            margin: 100px auto 0 auto;
            animation: lorem 5s linear infinite alternate;
        }
        @keyframes lorem {
            from{
                transform: scale(1.5) rotate(60deg);
            }
            to{
                transform: scale(1) rotate(0deg);
                background-color: #1E90FF;
            }
        }
    </style>
</head>
<body>
    <div class="pink-box"></div>
</body>
</html>
