<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        .yes{
            appearance: none;
            width: 20px;
            height: 20px;
            border: 1px solid blue;
            margin-bottom: -5px;
            border-radius: 5px;
        }
        .yes:checked{
            background-color: #f453c1;
        }
    </style>
</head>
<body>

<label>
    <input type="checkbox" class="yes"> Yes
</label>

</body>
</html>
